# vLLM config tuned for teacher-logprob capture (off-policy distillation),
# sized for a ~4 GB GPU. Load with: synthra.load_server("examples/vllm_distill.yaml")

backend: vllm

model: Qwen/Qwen2.5-0.5B-Instruct
host: 127.0.0.1
port: 8000

dtype: bfloat16
max_model_len: 2048
gpu_memory_utilization: 0.70
enforce_eager: true
max_num_seqs: 8
enable_prefix_caching: false
enable_chunked_prefill: false
seed: 0

# --- distillation capture --------------------------------------------------
# k: how many top tokens to keep per position (this is the cap TeacherLogprobs
# requests via top_logprobs). 20 is a solid default; raise for denser KD.
max_logprobs: 20
# Return tokens as "token_id:<id>" so captured logprobs carry exact vocab ids.
return_tokens_as_token_ids: true
# Capture the teacher's TRUE distribution, before temperature/top-p/bad-words
# processors distort it. Use raw_logprobs for KD (raw_logits if you want logits).
logprobs_mode: raw_logprobs

startup_timeout: 900
env:
  VLLM_USE_FLASHINFER_SAMPLER: "0"
extra_args: []
