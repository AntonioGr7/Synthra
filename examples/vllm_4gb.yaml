# Minimal vLLM config tuned for a ~4 GB GPU (e.g. RTX 2050).
# Smoke-test only: small model, short context, eager mode.
# Load with:  synthra.load_server("examples/vllm_4gb.yaml")

backend: vllm

model: Qwen/Qwen2.5-0.5B-Instruct
host: 127.0.0.1
port: 8000

dtype: bfloat16
max_model_len: 2048

# Fit in ~4 GB
gpu_memory_utilization: 0.70
enforce_eager: true                # no CUDA-graph memory overhead
max_num_seqs: 8
enable_prefix_caching: false
enable_chunked_prefill: false

seed: 0
max_logprobs: 20

# Give the (slow, first-time) weight download room to finish.
startup_timeout: 900

# Use vLLM's native PyTorch sampler instead of FlashInfer, which would JIT-compile
# a CUDA kernel at startup (needs ninja + nvcc; slow and fragile on small/WSL boxes).
env:
  VLLM_USE_FLASHINFER_SAMPLER: "0"

extra_args: []
